name: Build P41 Bootstrap Windows

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: Publicar el instalador como GitHub Release
        required: false
        default: false
        type: boolean
      release_tag:
        description: Tag del release manual, por ejemplo v1.0.0
        required: false
        type: string
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Flutter pub get app
        shell: pwsh
        working-directory: app
        run: |
          flutter pub get

      - name: Flutter pub get launcher
        shell: pwsh
        working-directory: launcher
        run: |
          flutter pub get

      - name: Analyze app
        shell: pwsh
        working-directory: app
        run: |
          flutter analyze

      - name: Analyze launcher
        shell: pwsh
        working-directory: launcher
        run: |
          flutter analyze

      - name: Build app
        shell: pwsh
        run: |
          ./scripts/build_pos.ps1 -RunCodegen Auto

      - name: Package app update zip
        shell: pwsh
        run: |
          $VersionLine = Select-String -Path "app\pubspec.yaml" -Pattern "^version: " | Select-Object -First 1
          $Version = ($VersionLine.Line -replace "version: ", "").Trim()
          $ShortVersion = ($Version -split "\+")[0]
          $BuildOutputCandidates = @(
            "app\build\windows\x64\runner\Release",
            "app\build\windows\runner\Release"
          )
          $BuildOutputDir = $BuildOutputCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $BuildOutputDir) {
            throw "App build output directory not found."
          }
          $VersionJsonPath = Join-Path $BuildOutputDir "version.json"
          @{ version = $Version } | ConvertTo-Json | Set-Content -Path $VersionJsonPath
          $PackageDir = "release-assets"
          New-Item -ItemType Directory -Force -Path $PackageDir | Out-Null
          $ZipPath = Join-Path $PackageDir "p41-windows-v$ShortVersion.zip"
          if (Test-Path $ZipPath) {
            Remove-Item $ZipPath -Force
          }
          Compress-Archive -Path "$BuildOutputDir\*" -DestinationPath $ZipPath -Force

      - name: Build launcher
        shell: pwsh
        run: |
          ./scripts/build_launcher.ps1

      - name: Build installer
        shell: pwsh
        run: |
          ./scripts/create_launcher_installer.ps1

      - name: Upload launcher build
        uses: actions/upload-artifact@v4
        with:
          name: p41-bootstrap-windows
          path: launcher/build/windows/**/Release/**
          if-no-files-found: error

      - name: Upload app update zip
        uses: actions/upload-artifact@v4
        with:
          name: p41-windows-app-update
          path: release-assets/p41-windows-v*.zip
          if-no-files-found: error

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: p41-bootstrap-installer
          path: launcher/installer/output/*.exe
          if-no-files-found: error

      - name: Publish installer release from tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            launcher/installer/output/*.exe
            release-assets/p41-windows-v*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true

      - name: Publish installer release manually
        if: github.event_name == 'workflow_dispatch' && inputs.publish_release && inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: P41 ${{ inputs.release_tag }}
          files: |
            launcher/installer/output/*.exe
            release-assets/p41-windows-v*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
